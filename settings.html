<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="stylesheet" href="style.css">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>XOClash — Settings</title>
    </head>
    <body>
        <nav>
            <span>XOClash</span>
            <div>
                <a href="lobby.html">Lobby</a>
                <a href="game.html">Game</a>
                <a href="leaderboard.html">Leaderboard</a>
                <a href="profile.html">Profile</a>
            </div>
            <div>
                <a href="settings.html">⚙️Settings</a>
                <button id="logoutBtn">Logout</button>
            </div>
        </nav>
        <main>
            <h2>⚙️ Settings</h2>

            <section>
                <h3>Appearance</h3>
                <h4>Theme</h4>
                <button id="lightbtn">☀️Light</button>
                <button id="darkbtn">🌙Dark</button>

                <h4>Font Size</h4>
                <button id="smallSize">Small</button>
                <button id="mediumSize">Medium</button>
                <button id="largeSize">Large</button>
            </section>

            <section>
                <h3>Game</h3>
                <div>
                    <span>Sound Effects</span>
                    <button id="soundOn">🔊 On</button>
                    <button id="soundOff">🔇 Off</button>
                </div>
                <div>
                    <span>Background Music</span>
                    <button id="musicOn">🎵 On</button>
                    <button id="musicOff">🎵 Off</button>
                </div>
            </section>
            
        </main>
        <script src="settings.js"></script>
    </body>
</html>
