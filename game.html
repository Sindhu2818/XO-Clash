<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>XOClash — Game</title>
    </head>
    <body>
        <!-- Minimal game bar — no full nav during gameplay -->
        <div class="game-bar">
            <span>XOClash</span>
            <button onclick="goBack()" id="backToLobbyBtn">⬅ Back to Lobby</button>
        </div>

        <main>
            <h1>🎮 Tic-Tac-Toe</h1>

            <h3 id="players">You vs Opponent</h3>

            <h3 id="turn">Turn: X</h3>

            <!-- Game Board -->
            <div id="board">
                <button onclick="cellClick(0)"></button>
                <button onclick="cellClick(1)"></button>
                <button onclick="cellClick(2)"></button>
                <button onclick="cellClick(3)"></button>
                <button onclick="cellClick(4)"></button>
                <button onclick="cellClick(5)"></button>
                <button onclick="cellClick(6)"></button>
                <button onclick="cellClick(7)"></button>
                <button onclick="cellClick(8)"></button>
            </div>

            <h2 id="result"></h2>
        </main>
        <script src="game.js"></script>

    </body>
</html>
