<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>XOClash — Profile</title>
</head>
<body>
    <nav>
        <span>XOClash</span>
        <div>
            <a href="lobby.html">Lobby</a>
            <a href="game.html">Game</a>
            <a href="leaderboard.html">Leaderboard</a>
            <a href="profile.html">Profile</a>
        </div>
        <div>
            <a href="settings.html">⚙️Settings</a>
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>

    <main>
        <h1>👤 Player Profile</h1>

        <section style="text-align:center; max-width:500px; margin:0 auto 24px;">
            <img id="profilePhoto"
                 src="https://via.placeholder.com/130?text=?"
                 alt="Profile Photo">

            <p id="playerName" style="margin-top:12px;">Loading...</p>
            <p id="studentId"></p>
            <p id="statusText" style="margin-top:4px;"></p>

            <div style="display:flex; justify-content:center; gap:40px; margin-top:20px;">
                <div>
                    <span id="eloScore">—</span>
                    <p style="font-size:0.9rem; color:var(--text-muted); margin-top:4px;">Elo Rating</p>
                </div>
                <div>
                    <span id="playerRank">—</span>
                    <p style="font-size:0.9rem; color:var(--text-muted); margin-top:4px;">Rank</p>
                </div>
                <div>
                    <span id="totalGames" style="font-family:var(--font-display); font-size:var(--text-3xl); color:var(--teal); text-shadow:2px 2px 0 #1a7070;">—</span>
                    <p style="font-size:0.9rem; color:var(--text-muted); margin-top:4px;">Games</p>
                </div>
            </div>
        </section>

        <section>
            <h2>📜 Match History</h2>
            <p id="noMatches" style="text-align:center; color:var(--text-muted); display:none;">No matches played yet.</p>
            <table id="matchTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Opponent</th>
                        <th>Result</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="matchHistory"></tbody>
            </table>
        </section>
    </main>

    <script src="profile.js"></script>
</body>
</html>
